<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Perya Color Game</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
        background: #1a1a2e;
        color: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    #wallet-ui {
        position: absolute;
        top: 20px;
        background: rgba(0,0,0,0.6);
        padding: 10px 25px;
        border-radius: 50px;
        border: 2px solid #ffcc00;
        font-weight: 900;
        font-size: 1.2rem;
    }

    .dice-container {
        display: flex;
        gap: 20px;
        margin-bottom: 40px;
    }

    .die {
        width: 80px;
        height: 80px;
        border-radius: 15px;
        background: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .color-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        width: 90%;
        max-width: 400px;
    }

    .color-box {
        aspect-ratio: 1;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-weight: 900;
        border: 4px solid transparent;
        transition: transform 0.1s;
        position: relative;
    }

    .color-box:active { transform: scale(0.95); }
    .color-box.selected { border-color: white; box-shadow: 0 0 15px white; }

    .bet-tag {
        position: absolute;
        top: -10px;
        background: #ffcc00;
        color: black;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 12px;
        display: none;
    }

    #roll-btn {
        margin-top: 30px;
        padding: 15px 50px;
        background: #ffcc00;
        color: black;
        border: none;
        border-radius: 50px;
        font-weight: 900;
        font-size: 1.2rem;
        cursor: pointer;
        box-shadow: 0 5px 0 #b38f00;
    }

    #roll-btn:disabled { background: #555; box-shadow: none; cursor: default; }
    
    #result-msg {
        margin-top: 20px;
        height: 30px;
        font-weight: bold;
        color: #4caf50;
    }

    /* Colors */
    .c-red { background: #e63946; }
    .c-blue { background: #457b9d; }
    .c-yellow { background: #ffbe0b; color: black; }
    .c-white { background: #f1faee; color: black; }
    .c-pink { background: #ff006e; }
    .c-green { background: #06d6a0; }
</style>
</head>
<body>

<div id="wallet-ui">💰 ₱<span id="balance">0</span></div>

<div class="dice-container">
    <div class="die" id="die1">?</div>
    <div class="die" id="die2">?</div>
    <div class="die" id="die3">?</div>
</div>

<div class="color-grid">
    <div class="color-box c-red" onclick="placeBet('red', this)">RED <span class="bet-tag">₱0</span></div>
    <div class="color-box c-blue" onclick="placeBet('blue', this)">BLUE <span class="bet-tag">₱0</span></div>
    <div class="color-box c-yellow" onclick="placeBet('yellow', this)">YELLOW <span class="bet-tag">₱0</span></div>
    <div class="color-box c-white" onclick="placeBet('white', this)">WHITE <span class="bet-tag">₱0</span></div>
    <div class="color-box c-pink" onclick="placeBet('pink', this)">PINK <span class="bet-tag">₱0</span></div>
    <div class="color-box c-green" onclick="placeBet('green', this)">GREEN <span class="bet-tag">₱0</span></div>
</div>

<div id="result-msg"></div>

<button id="roll-btn" onclick="rollDice()">ROLL DICE</button>

<script>
    let wallet = parseInt(localStorage.getItem('crosserHighscore')) || 1000;
    let currentBets = {};
    const colors = ['red', 'blue', 'yellow', 'white', 'pink', 'green'];
    const colorHex = {
        red: '#e63946', blue: '#457b9d', yellow: '#ffbe0b',
        white: '#f1faee', pink: '#ff006e', green: '#06d6a0'
    };

    function updateUI() {
        document.getElementById('balance').innerText = wallet.toLocaleString();
        localStorage.setItem('crosserHighscore', wallet);
    }

    function placeBet(color, el) {
        if (wallet < 10) return alert("Low balance!");
        
        wallet -= 10;
        currentBets[color] = (currentBets[color] || 0) + 10;
        
        const tag = el.querySelector('.bet-tag');
        tag.innerText = "₱" + currentBets[color];
        tag.style.display = "block";
        el.classList.add('selected');
        
        updateUI();
    }

    function rollDice() {
        const betColors = Object.keys(currentBets);
        if (betColors.length === 0) return alert("Place a bet first!");

        const btn = document.getElementById('roll-btn');
        btn.disabled = true;
        document.getElementById('result-msg').innerText = "Rolling...";

        let results = [];
        const diceElements = [document.getElementById('die1'), document.getElementById('die2'), document.getElementById('die3')];

        // Animate rolling
        let rollCount = 0;
        let interval = setInterval(() => {
            diceElements.forEach(d => {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                d.style.background = colorHex[randomColor];
                d.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;
            });
            rollCount++;
            if (rollCount > 15) {
                clearInterval(interval);
                finalizeRoll();
            }
        }, 100);

        function finalizeRoll() {
            results = [
                colors[Math.floor(Math.random() * colors.length)],
                colors[Math.floor(Math.random() * colors.length)],
                colors[Math.floor(Math.random() * colors.length)]
            ];

            results.forEach((res, i) => {
                diceElements[i].style.background = colorHex[res];
                diceElements[i].style.transform = "rotate(0deg) scale(1.1)";
                diceElements[i].innerText = ""; // Clear text
            });

            calculateWin(results);
        }
    }

    function calculateWin(results) {
        let totalWin = 0;
        let winDetails = "";

        for (let betColor in currentBets) {
            const matches = results.filter(r => r === betColor).length;
            const betAmount = currentBets[betColor];

            if (matches === 1) {
                totalWin += betAmount * 2;
            } else if (matches === 2) {
                totalWin += betAmount * 3;
            } else if (matches === 3) {
                totalWin += betAmount * 5;
            }
        }

        wallet += totalWin;
        
        if (totalWin > 0) {
            document.getElementById('result-msg').innerText = `YOU WON ₱${totalWin}!`;
            document.getElementById('result-msg').style.color = "#4caf50";
        } else {
            document.getElementById('result-msg').innerText = "Better luck next time!";
            document.getElementById('result-msg').style.color = "#ff4444";
        }

        // Reset bets
        currentBets = {};
        document.querySelectorAll('.bet-tag').forEach(t => t.style.display = "none");
        document.querySelectorAll('.color-box').forEach(b => b.classList.remove('selected'));
        document.getElementById('roll-btn').disabled = false;
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
