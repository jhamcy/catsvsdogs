<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Endless Road Crosser: Gamble Edition</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; touch-action: none; }
body {
    background: #051405;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overscroll-behavior: none;
}

canvas {
    display: block;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
}

#topUI {
    position: absolute;
    top: 20px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 10;
}

.ui-container {
    display: flex;
    gap: 15px;
}

.ui-box {
    background: rgba(0, 0, 0, 0.8);
    padding: 10px 20px;
    border-radius: 15px;
    color: #fff;
    font-weight: 800;
    font-size: 18px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    text-align: center;
}

.gamble-box {
    border-color: #ffcc00;
    color: #ffcc00;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { box-shadow: 0 0 5px #ffcc00; }
    to { box-shadow: 0 0 20px #ffcc00; }
}

#bottomUI {
    position: absolute;
    bottom: 30px;
    width: 100%;
    text-align: center;
    z-index: 10;
}

#cashOutBtn {
    display: none;
    background: #4caf50;
    color: white;
    padding: 15px 40px;
    border-radius: 50px;
    font-weight: 900;
    border: none;
    box-shadow: 0 4px 0 #2e7d32;
    font-size: 18px;
    pointer-events: auto;
}

#startScreen, #gameOverScreen, #selectionScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    backdrop-filter: blur(8px);
}

#gameOverScreen, #selectionScreen { display: none; }

.box {
    background: linear-gradient(145deg, #1a1a1a, #000);
    padding: 30px;
    border-radius: 24px;
    text-align: center;
    border: 2px solid #ffcc00;
    box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    max-width: 90%;
}

h2 { font-size: 32px; margin-bottom: 10px; color: #ffcc00; letter-spacing: 1px; }
p { font-size: 20px; margin-bottom: 20px; opacity: 0.9; }

.btn-group { display: flex; gap: 10px; justify-content: center; }

button {
    padding: 15px 30px;
    border: none;
    border-radius: 12px;
    background: #ffcc00;
    color: #000;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 0 #b38f00;
    transition: transform 0.05s, box-shadow 0.05s;
}

button:active { transform: translateY(2px); box-shadow: 0 2px 0 #b38f00; }

.selection-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
    max-height: 50vh;
    overflow-y: auto;
    padding: 10px;
}

.char-item {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    border: 2px solid transparent;
    cursor: pointer;
}

.char-item.selected { border-color: #ffcc00; background: rgba(255,204,0,0.1); }
</style>
</head>

<body>

<div id="topUI">
    <div class="ui-container">
        <div class="ui-box">WALLET: 💰 <span id="bankedCoins">0</span></div>
        <div class="ui-box gamble-box">POT: 💰 <span id="potentialCoins">0</span></div>
    </div>
    <div id="multiplierTag" style="color: #ffcc00; font-weight: 900; text-shadow: 0 0 10px #000;">X1 MULTIPLIER</div>
</div>

<div id="bottomUI">
    <button id="cashOutBtn" onclick="cashOut()">CASH OUT</button>
</div>

<div id="startScreen">
    <div class="box">
        <h1 id="mainEmojiDisplay" style="margin-bottom:20px; font-size: 60px;">🐈</h1>
        <h2>GAMBLE CROSSER</h2>
        <p>Wallet: 💰 <span id="recordDisplay">0</span></p>
        <p style="font-size: 14px; color: #ffcc00;">Cost to Play: 10 Coins</p>
        <div class="btn-group">
            <button onclick="checkAndStart()">PLAY (-10)</button>
            <button onclick="openSelection()" style="background: #fff;">CHAR</button>
        </div>
    </div>
</div>

<div id="selectionScreen">
    <div class="box">
        <h2>SELECT PLAYER</h2>
        <div class="selection-grid" id="selectionGrid"></div>
        <button onclick="closeSelection()" style="margin-top:20px; background:#fff;">CONFIRM</button>
    </div>
</div>

<div id="gameOverScreen">
    <div class="box">
        <h2 style="color: #ff4444;">BUSTED!</h2>
        <p>You lost your bet!</p>
        <p>Wallet: 💰 <span id="finalScore">0</span></p>
        <button onclick="checkAndStart()">REPLAY (-10)</button>
        <button onclick="showStart()" style="background: #fff; margin-top: 10px;">HOME</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const selectionScreen = document.getElementById('selectionScreen');
const cashOutBtn = document.getElementById('cashOutBtn');

let gameState = {
    totalCoins: parseInt(localStorage.getItem('crosserHighscore')) || 100, // Start with 100
    currentChar: localStorage.getItem('crosserChar') || '🐈'
};

const characters = [
    { emoji: '🐈', name: 'Cat' }, { emoji: '🐕', name: 'Dog' },
    { emoji: '🐅', name: 'Tiger' }, { emoji: '🐆', name: 'Leopard' },
    { emoji: '🐖', name: 'Pig' }, { emoji: '🐇', name: 'Bunny' },
    { emoji: '🐔', name: 'Chicken' }, { emoji: '🐢', name: 'Turtle' }
];

function updateUI() {
    document.getElementById('recordDisplay').innerText = gameState.totalCoins;
    document.getElementById('bankedCoins').innerText = gameState.totalCoins;
    document.getElementById('mainEmojiDisplay').innerText = gameState.currentChar;
}

function save() {
    localStorage.setItem('crosserHighscore', gameState.totalCoins);
    localStorage.setItem('crosserChar', gameState.currentChar);
    updateUI();
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const sfx = {
    play(freq, type, duration, vol = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    },
    jump() { this.play(400, 'sine', 0.2); },
    point(mult) { this.play(880 + (mult * 50), 'square', 0.05, 0.03); },
    death() { this.play(80, 'sawtooth', 0.6); },
    coin() { this.play(1200, 'sine', 0.4, 0.05); }
};

let potentialCoins, currentMultiplier, laneWidth = 110, gameRunning, cameraX, nextLaneX;
const player = { x:0, y:0, targetX:0, isHopping:false, jumpProgress:0 };
let trafficLanes = [];

function checkAndStart() {
    if (gameState.totalCoins >= 10) {
        gameState.totalCoins -= 10;
        save();
        startGame();
    } else {
        alert("Not enough coins! Need 10.");
    }
}

function startGame() {
    startScreen.style.display = "none";
    gameOverScreen.style.display = "none";
    initGame();
    loop();
}

function initGame() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    potentialCoins = 0;
    currentMultiplier = 1;
    nextLaneX = 350; 
    trafficLanes = [];
    cashOutBtn.style.display = "none";
    document.getElementById('potentialCoins').innerText = potentialCoins;
    document.getElementById('multiplierTag').innerText = `X${currentMultiplier} MULTIPLIER`;
    generateLanes(15);
    player.x = 50; 
    player.targetX = player.x;
    player.y = canvas.height / 2;
    cameraX = 0;
    gameRunning = true;
    updateUI();
}

function generateLanes(count) {
    for (let i = 0; i < count; i++) {
        let dir = Math.random() > 0.5 ? 1 : -1;
        let speed = (2.5 + trafficLanes.length/10) * dir;
        let cars = [];
        for (let j = 0; j < 3; j++) {
            cars.push({ y: Math.random() * canvas.height });
        }
        trafficLanes.push({ x: nextLaneX, speed: speed, isPassed: false, cars: cars });
        nextLaneX += laneWidth;
    }
}

function handleInput() {
    if (!gameRunning || player.isHopping) return;
    sfx.jump();
    let jumpDist = (player.x >= 200) ? laneWidth : (trafficLanes[0].x + laneWidth/2) - player.x;
    player.targetX = player.x + jumpDist;
    player.isHopping = true;
    player.jumpProgress = 0;
}

window.addEventListener('pointerdown', (e) => { 
    if(gameRunning && e.target.id !== 'cashOutBtn') handleInput(); 
});

function update() {
    if (!gameRunning) return;
    if (player.isHopping) {
        player.jumpProgress += 0.12;
        player.x += (player.targetX - player.x) * 0.25;
        if (player.jumpProgress >= 1) {
            player.x = player.targetX;
            player.isHopping = false;
            trafficLanes.forEach(lane => {
                const laneCenter = lane.x + laneWidth/2;
                if (!lane.isPassed && Math.abs(player.x - laneCenter) < 10) {
                    lane.isPassed = true;
                    currentMultiplier++;
                    potentialCoins += currentMultiplier * 5;
                    sfx.point(currentMultiplier);
                    document.getElementById('potentialCoins').innerText = potentialCoins;
                    document.getElementById('multiplierTag').innerText = `X${currentMultiplier} MULTIPLIER`;
                    cashOutBtn.style.display = "block";
                }
            });
        }
    }
    if (player.x > nextLaneX - (canvas.width * 1.5)) generateLanes(10);
    cameraX += ((player.x - canvas.width / 3) - cameraX) * 0.1;
    if (cameraX < 0) cameraX = 0;

    trafficLanes.forEach(lane => {
        lane.cars.forEach(car => {
            car.y += lane.speed;
            if (car.y > canvas.height + 50) car.y = -50;
            if (car.y < -50) car.y = canvas.height + 50;
            if (!lane.isPassed && Math.abs(player.x - (lane.x + laneWidth/2)) < 40 && Math.abs(player.y - car.y) < 45) gameOver();
        });
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);
    ctx.fillStyle = "#1a3a16";
    ctx.fillRect(0, 0, 350, canvas.height);
    trafficLanes.forEach(lane => {
        ctx.fillStyle = lane.isPassed ? "#0a0a0a" : "#181818";
        ctx.fillRect(lane.x, 0, laneWidth, canvas.height);
        if (!lane.isPassed) {
            lane.cars.forEach(car => {
                ctx.font = "50px serif";
                ctx.textAlign = "center";
                ctx.fillText(lane.speed > 0 ? "🚘" : "🚙", lane.x + laneWidth/2, car.y);
            });
        }
    });
    let jumpY = player.isHopping ? Math.sin(player.jumpProgress * Math.PI) * 70 : 0;
    ctx.save();
    ctx.translate(player.x, player.y - jumpY);
    ctx.scale(-1, 1); 
    ctx.font = "65px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(gameState.currentChar, 0, 0);
    ctx.restore();
    ctx.restore();
}

function cashOut() {
    if (!gameRunning) return;
    gameRunning = false;
    gameState.totalCoins += potentialCoins;
    sfx.coin();
    save();
    showStart();
}

function gameOver() {
    gameRunning = false;
    sfx.death();
    document.getElementById("finalScore").innerText = gameState.totalCoins;
    gameOverScreen.style.display = "flex";
    cashOutBtn.style.display = "none";
}

function showStart() {
    gameOverScreen.style.display = "none";
    startScreen.style.display = "flex";
    cashOutBtn.style.display = "none";
    updateUI();
}

function loop() {
    update();
    draw();
    if(gameRunning) requestAnimationFrame(loop);
}

function openSelection() {
    startScreen.style.display = "none";
    selectionScreen.style.display = "flex";
    renderSelection();
}

function closeSelection() {
    selectionScreen.style.display = "none";
    startScreen.style.display = "flex";
}

function renderSelection() {
    const grid = document.getElementById('selectionGrid');
    grid.innerHTML = '';
    characters.forEach(char => {
        const item = document.createElement('div');
        item.className = `char-item ${gameState.currentChar === char.emoji ? 'selected' : ''}`;
        item.innerHTML = `<span style="transform: scaleX(-1); display: inline-block; font-size:40px;">${char.emoji}</span>`;
        item.onclick = () => { gameState.currentChar = char.emoji; save(); renderSelection(); };
        grid.appendChild(item);
    });
}

updateUI();
</script>

</body>
</html>
